{% extends 'tutorias/base.html' %}

{% block title %}Iniciar Sesión | TutorConnect{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow-sm p-4 mt-5 bg-white rounded">
            <h3 class="text-center mb-4 text-dark">Iniciar Sesión</h3>
            
            <form method="POST">
                {% csrf_token %}
                
                {{ form.as_p }}
                
                <button type="submit" class="btn btn-primary w-100 mt-3">Ingresar</button>
            </form>
            
            <p class="text-center mt-3 mb-0">
                <small class="text-muted">¿No tenés cuenta? <a href="{% url 'registro' %}" class="text-decoration-none">Registrate acá</a></small>
            </p>
        </div>
    </div>
</div>
{% endblock %}
