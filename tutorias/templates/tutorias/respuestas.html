{% extends 'tutorias/base.html' %}

{% block title %}Panel de Respuestas | TutorConnect{% endblock %}

{% block content %}
<div class="container">
    <h3 class="mb-4 text-dark">📥 Bandeja de Consultas Recibidas</h3>
    <p class="text-muted">Aquí aparecen las dudas de los estudiantes asignadas a tus materias.</p>

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-light d-flex justify-content-between align-items-center">
            
            <div class="d-flex align-items-center">
                <label class="fw-bold text-secondary me-2 m-0">Materia:</label>
                <select class="form-select form-select-sm" style="width: auto;" required>
                    <option value="">-- Selecciona --</option>
                    {% for materia in materias %}
                        <option value="{{ materia.id }}">{{ materia.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
    
        </div>
    </div>
        </div>
        <div class="card-body">
       
            <hr>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold text-primary">Tu respuesta:</label>
                    <textarea class="form-control" rows="3" placeholder="Escribe la explicación para el alumno..." required></textarea>
                </div>
                <button type="submit" class="btn btn-success btn-sm px-4">Enviar Respuesta</button>
            </form>
        </div>
    </div>

</div>
{% endblock %}
